# This file is the entry point to configure your own services.
# Files in the packages/ directory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Configure AI services with the project directory
    App\AI\GestureIntentAi:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\AI\VoiceIntentAi:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure ProductVideoGeneratorService with the project directory
    App\Service\ProductVideoGeneratorService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Configure FaceEncodingStore with faceid encodings directory
    App\Service\FaceEncodingStore:
        arguments:
            $encodingsDir: '%kernel.project_dir%/var/faceid/encodings'

    # Configure FaceIdClient for Face ID service communication
    App\Service\FaceIdClient:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $pythonBin: '%env(FACE_ID_PYTHON_BIN)%'
            $host: '%env(FACE_ID_HOST)%'
            $port: '%env(int:FACE_ID_PORT)%'
            $threshold: '%env(float:FACE_ID_THRESHOLD)%'