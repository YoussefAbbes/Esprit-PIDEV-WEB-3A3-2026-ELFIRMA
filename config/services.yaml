parameters:
    face_id.python_default: '%kernel.project_dir%/scripts/faceid/.venv/Scripts/python'
    face_id.host_default: '127.0.0.1'
    face_id.port_default: '8765'
    face_id.threshold_default: '0.28'
    face_id.python_bin: '%env(default:face_id.python_default:FACE_ID_PYTHON_BIN)%'
    face_id.host: '%env(default:face_id.host_default:FACE_ID_HOST)%'
    face_id.port: '%env(int:default:face_id.port_default:FACE_ID_PORT)%'
    face_id.threshold: '%env(float:default:face_id.threshold_default:FACE_ID_THRESHOLD)%'
    face_id.encodings_dir: '%kernel.project_dir%/var/faceid/encodings'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\FaceIdClient:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $pythonBin: '%face_id.python_bin%'
            $host: '%face_id.host%'
            $port: '%face_id.port%'
            $threshold: '%face_id.threshold%'

    App\Service\FaceEncodingStore:
        arguments:
            $encodingsDir: '%face_id.encodings_dir%'