    filter_value_name: filterValue
    distinct: true
    page_out_of_range: ignore
    default_limit: 10
  template:
    pagination: 'partials/knp_pagination_professional.html.twig'
    sortable: '@KnpPaginator/Pagination/sortable_link.html.twig'
